# BUNKER POOL - Secrets
apiVersion: v1
kind: Secret
metadata:
  name: bunker-pool-secrets
  namespace: bunker-pool
  labels:
    app.kubernetes.io/name: bunker-pool
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: bunker-mining-suite
type: Opaque
data:
  # Base64 encoded values - replace with actual values in production
  # echo -n "your_secure_password" | base64
  coin_daemon_password: c2VjdXJlX3Bhc3N3b3JkXzEyMw==  # secure_password_123
  redis_password: ""  # Empty if Redis has no password
  pool_wallet_private_key: ""  # Base64 encoded private key (if needed)

---
# Additional secret for TLS certificates (if using HTTPS)
apiVersion: v1
kind: Secret
metadata:
  name: bunker-pool-tls
  namespace: bunker-pool
  labels:
    app.kubernetes.io/name: bunker-pool
    app.kubernetes.io/component: tls
    app.kubernetes.io/part-of: bunker-mining-suite
type: kubernetes.io/tls
data:
  # Add your TLS certificate and key here
  # kubectl create secret tls bunker-pool-tls --cert=path/to/cert.pem --key=path/to/key.pem -n bunker-pool
  tls.crt: ""
  tls.key: ""