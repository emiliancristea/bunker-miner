# BUNKER POOL - Horizontal Pod Autoscaler
# Automatically scale based on CPU and memory usage

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bunker-pool-hpa
  namespace: bunker-pool
  labels:
    app.kubernetes.io/name: bunker-pool
    app.kubernetes.io/component: autoscaler
    app.kubernetes.io/part-of: bunker-mining-suite
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bunker-pool-stratum
  minReplicas: 3
  maxReplicas: 20
  metrics:
    # CPU-based scaling
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Memory-based scaling
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    # Custom metric: active connections per pod
    - type: Pods
      pods:
        metric:
          name: bunker_pool_active_connections_per_pod
        target:
          type: AverageValue
          averageValue: "500"  # Scale up when > 500 connections per pod
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # 5 minutes
      policies:
        - type: Percent
          value: 10
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60   # 1 minute
      policies:
        - type: Percent
          value: 50
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 60