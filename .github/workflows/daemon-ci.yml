# BUNKER MINER - Rust Workspace Baseline
#
# This workflow is the current hard Rust gate. It intentionally checks only the
# root workspace members listed in Cargo.toml. Product crates that are excluded
# there are not release-ready and must be brought into the workspace as they are
# fixed.

name: Rust Workspace Baseline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'libs/common-rust/**'
      - 'infra/stubs/**'
      - '.github/workflows/daemon-ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'libs/common-rust/**'
      - 'infra/stubs/**'
      - '.github/workflows/daemon-ci.yml'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: "-Dwarnings"

jobs:
  workspace:
    name: Workspace Gate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-workspace-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-workspace-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check compilation
        run: cargo check --workspace

      - name: Run tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
