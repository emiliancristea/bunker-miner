apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-controller
  namespace: bunker-fleet
  labels:
    app: fleet-controller
    component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: fleet-controller
  template:
    metadata:
      labels:
        app: fleet-controller
        component: backend
    spec:
      containers:
      - name: fleet-controller
        image: bunker/fleet-controller:latest
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: fleet-controller-config
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: fleet-controller-config
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: fleet-controller-secrets
              key: JWT_SECRET
        - name: SERVER_HOST
          valueFrom:
            configMapKeyRef:
              name: fleet-controller-config
              key: SERVER_HOST
        - name: SERVER_PORT
          valueFrom:
            configMapKeyRef:
              name: fleet-controller-config
              key: SERVER_PORT
        - name: ENVIRONMENT
          valueFrom:
            configMapKeyRef:
              name: fleet-controller-config
              key: ENVIRONMENT
        - name: JWT_EXPIRATION
          valueFrom:
            configMapKeyRef:
              name: fleet-controller-config
              key: JWT_EXPIRATION
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
              - ALL
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      restartPolicy: Always