apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fleet-controller-ingress
  namespace: bunker-fleet
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/websocket-services: "fleet-controller-service"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - fleet.bunker.local
    secretName: fleet-controller-tls
  rules:
  - host: fleet.bunker.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fleet-controller-service
            port:
              number: 80