syntax = "proto3";

package bunker.daemon;

// Service definition for daemon communication
service DaemonService {
    // Simple ping-pong for connectivity testing
    rpc Ping(PingRequest) returns (PingResponse);
    
    // Get system hardware information
    rpc GetSystemInfo(SystemInfoRequest) returns (SystemInfoResponse);
    
    // Stream real-time mining statistics
    rpc StreamMiningStats(StreamingRequest) returns (stream MiningStatsUpdate);
    
    // Start mining operation
    rpc StartMining(StartMiningRequest) returns (StartMiningResponse);
    
    // Stop mining operation
    rpc StopMining(StopMiningRequest) returns (StopMiningResponse);
}

// Basic connectivity test messages
message PingRequest {
    string message = 1;
    int64 timestamp = 2;
}

message PingResponse {
    string echo_message = 1;
    int64 server_timestamp = 2;
    int64 client_timestamp = 3;
    string server_version = 4;
}

// System information messages
message SystemInfoRequest {
    bool include_gpu_details = 1;
    bool include_cpu_details = 2;
}

message GpuInfo {
    uint32 index = 1;
    string name = 2;
    string uuid = 3;
    uint64 memory_total_mb = 4;
    uint64 memory_free_mb = 5;
    string driver_version = 6;
    uint32 temperature_c = 7;
    uint32 power_usage_w = 8;
    uint32 gpu_utilization = 9;
    uint32 memory_utilization = 10;
    uint32 core_clock_mhz = 11;
    uint32 memory_clock_mhz = 12;
}

message CpuInfo {
    string name = 1;
    string vendor = 2;
    uint32 cores_physical = 3;
    uint32 cores_logical = 4;
    uint64 frequency_mhz = 5;
    float usage_percent = 6;
}

message SystemInfoResponse {
    int64 timestamp = 1;
    repeated GpuInfo gpus = 2;
    CpuInfo cpu = 3;
    uint64 total_memory_gb = 4;
    uint64 available_memory_gb = 5;
    string platform = 6;
    string daemon_version = 7;
}

// Real-time streaming messages
message StreamingRequest {
    uint32 update_interval_ms = 1; // How often to send updates
}

message MiningStatsUpdate {
    int64 timestamp = 1;
    double hashrate_hs = 2;
    uint64 shares_accepted = 3;
    uint64 shares_rejected = 4;
    uint64 uptime_seconds = 5;
    repeated GpuInfo gpu_stats = 6;
    string miner_status = 7;
    uint64 error_count = 8;
}

// Mining control messages
message StartMiningRequest {
    string pool_url = 1;
    string wallet_address = 2;
    string miner_executable = 3;
    repeated string miner_args = 4;
    string algorithm = 5;
}

message StartMiningResponse {
    bool success = 1;
    string message = 2;
    uint32 process_id = 3;
    int64 start_timestamp = 4;
}

message StopMiningRequest {
    uint32 process_id = 1;
    bool force_kill = 2;
}

message StopMiningResponse {
    bool success = 1;
    string message = 2;
    int64 stop_timestamp = 3;
}